services:
  gateway:
    build: .
    container_name: ${GATEWAY_CONTAINER_NAME:-gateway}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      AUTH_SERVICE_HOST: ${AUTH_CONTAINER_NAME:-auth-service}
      USER_SERVICE_HOST: ${USER_CONTAINER_NAME:-user-service}
      ORDER_SERVICE_HOST: ${ORDER_CONTAINER_NAME:-order-service}
      PAYMENT_SERVICE_HOST: ${PAYMENT_CONTAINER_NAME:-payment-service}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - app_net
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  auth-service:
    build: ../authenticationservice
    container_name: ${AUTH_CONTAINER_NAME:-auth-service}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_HOST: ${POSTGRES_CONTAINER_NAME:-postgres}
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-store}
      DATABASE_SCHEMA: ${AUTH_DATABASE_SCHEMA:-auth_schema}
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      USER_SERVICE_URL: http://${USER_CONTAINER_NAME:-user-service}:8081
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION}
    ports:
      - "${AUTH_SERVICE_PORT:-8082}:8082"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  user-service:
    build: ../userservice
    container_name: ${USER_CONTAINER_NAME:-user-service}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_HOST: ${POSTGRES_CONTAINER_NAME:-postgres}
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-store}
      DATABASE_SCHEMA: ${USER_DATABASE_SCHEMA:-user_schema}
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: ${REDIS_CONTAINER_NAME:-redis}
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${USER_SERVICE_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_net
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  order-service:
    build: ../orderservice
    container_name: ${ORDER_CONTAINER_NAME:-order-service}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_HOST: ${POSTGRES_CONTAINER_NAME:-postgres}
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-store}
      DATABASE_SCHEMA: ${ORDER_DATABASE_SCHEMA:-order_schema}
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      USER_SERVICE_URL: http://${USER_CONTAINER_NAME:-user-service}:8081
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_CONTAINER_NAME:-kafka}:9092
      KAFKA_TOPICS_PAYMENT_EVENTS: payment-events
      KAFKA_TOPICS_PAYMENT_COMPENSATION: payment-compensation
    ports:
      - "${ORDER_SERVICE_PORT:-8083}:8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app_net
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  payment-service:
    build: ../paymentservice
    container_name: ${PAYMENT_CONTAINER_NAME:-payment-service}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MONGODB_URI: mongodb://${MONGO_CONTAINER_NAME:-mongo}:27017/${MONGO_DB_NAME:-payment_db}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_CONTAINER_NAME:-kafka}:9092
      KAFKA_TOPICS_PAYMENT_EVENTS: payment-events
      KAFKA_TOPICS_PAYMENT_COMPENSATION: payment-compensation
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION}
      RANDOM_API_URL: ${RANDOM_API_URL:-https://www.random.org/integers/?num=1&min=1&max=10&col=1&base=10&format=plain}
    ports:
      - "${PAYMENT_SERVICE_PORT:-8084}:8084"
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app_net
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-store}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../userservice/db/init-user-schema.sql:/docker-entrypoint-initdb.d/init-user-schema.sql
      - ../authenticationservice/db/init-auth-schema.sql:/docker-entrypoint-initdb.d/init-auth-schema.sql
      - ../orderservice/db/init-order-schema.sql:/docker-entrypoint-initdb.d/init-order-schema.sql
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME:-redis}
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net
    volumes:
      - redis_data:/data

  mongo:
    image: mongo:6
    container_name: ${MONGO_CONTAINER_NAME:-mongo}
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app_net
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: ${KAFKA_CONTAINER_NAME:-kafka}
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - app_net
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  mongo_data:

networks:
  app_net:
    driver: bridge