server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://${AUTH_SERVICE_HOST:localhost}:8082
              predicates:
                - Path=/api/v1/auth/**
            - id: user-service
              uri: http://${USER_SERVICE_HOST:localhost}:8081
              predicates:
                - Path=/api/v1/users/**, /api/v1/cards/**
            - id: order-service
              uri: http://${ORDER_SERVICE_HOST:localhost}:8083
              predicates:
                - Path=/api/v1/orders/**

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health