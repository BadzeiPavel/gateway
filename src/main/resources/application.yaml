server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://${AUTH_SERVICE_HOST:localhost}:${AUTH_SERVICE_PORT:8081}
              predicates:
                - Path=/api/v1/auth/**
            - id: user-service
              uri: http://${USER_SERVICE_HOST:localhost}:${USER_SERVICE_PORT:8082}
              predicates:
                - Path=/api/v1/users/**, /api/v1/cards/**
            - id: order-service
              uri: http://${ORDER_SERVICE_HOST:localhost}:${ORDER_SERVICE_PORT:8083}
              predicates:
                - Path=/api/v1/orders/**
            - id: payment-service
              uri: http://${PAYMENT_SERVICE_HOST:localhost}:${PAYMENT_SERVICE_PORT:8084}
              predicates:
                - Path=/api/v1/payments/**

security:
  public-paths:
    - /api/v1/auth/login
    - /api/v1/auth/register
    - /actuator/health

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health